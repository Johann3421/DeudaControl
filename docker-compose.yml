# docker-compose.yml — Solo para pruebas locales.
# En Dokploy NO necesitas este archivo; Dokploy usa el Dockerfile directamente.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      APP_NAME: "Control de Deudas"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost
      APP_KEY: "" # Se genera automáticamente en el primer arranque

      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: control_deudas
      DB_USERNAME: deudas_user
      DB_PASSWORD: SecurePassword123!

      SESSION_DRIVER: database
      SESSION_LIFETIME: "120"
      CACHE_STORE: database
      QUEUE_CONNECTION: database

      SIAF_PROXY_URL: ""
      SIAF_PROXY_SECRET: ""
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: control_deudas
      POSTGRES_USER: deudas_user
      POSTGRES_PASSWORD: SecurePassword123!
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deudas_user -d control_deudas"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
