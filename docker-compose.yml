# docker-compose.yml
# Dokploy usa este archivo con su proxy Traefik interno.
# NO se exponen puertos al host — Dokploy enruta internamente por dominio.
#
# Todas las variables sensibles (APP_KEY, DB_PASSWORD, APP_URL, etc.)
# deben configurarse en la pestaña "Environment" de Dokploy.
# docker-compose lee los valores mediante ${VAR:-default}.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_NAME: "Control de Deudas"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost}
      APP_KEY: ${APP_KEY:-}

      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE:-control_deudas}
      DB_USERNAME: ${DB_USERNAME:-deudas_user}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}

      SESSION_DRIVER: database
      SESSION_LIFETIME: "480"
      CACHE_STORE: database
      QUEUE_CONNECTION: database

      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@example.com}
      MAIL_FROM_NAME: "Control de Deudas"

      SIAF_PROXY_URL: ${SIAF_PROXY_URL:-}
      SIAF_PROXY_SECRET: ${SIAF_PROXY_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-control_deudas}
      POSTGRES_USER: ${DB_USERNAME:-deudas_user}
      # POSTGRES_PASSWORD siempre igual que DB_PASSWORD → nunca desincronizados
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-deudas_user} -d ${DB_DATABASE:-control_deudas}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data_v2:
